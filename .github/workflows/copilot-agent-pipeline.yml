name: Copilot Agent Pipeline

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: '対象のIssue番号'
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  plan-and-implement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get issue content
        id: issue
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.inputs.issue_number }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body')
          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_BODY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Create branch and Pull Request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          BRANCH_NAME="copilot/issue-${ISSUE_NUMBER}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 既存のリモートブランチがあれば削除
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH_NAME"
          fi

          git checkout -b "$BRANCH_NAME"
          git commit --allow-empty -m "chore: start work on issue #${ISSUE_NUMBER}"
          git push -u origin "$BRANCH_NAME"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "[WIP] ${{ steps.issue.outputs.title }} (Issue #${ISSUE_NUMBER})" \
            --body "Closes #${ISSUE_NUMBER}

          このPRはCopilot Agent Pipelineによって自動生成されました。")

          PR_NUMBER=$(gh pr view "$PR_URL" --json number -q '.number')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      # --- Planning Phase ---
      - name: Post planning start comment
        id: planning-comment
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          COMMENT_ID=$(gh api \
            -X POST \
            "/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments" \
            -f body="🔄 **Planning開始**: implementation-planner エージェントが計画を作成中です..." \
            --jq '.id')
          echo "id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Run implementation-planner agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          PROMPT="以下のIssueの内容に基づいて実装計画を作成してください。

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}"

          gh copilot -- \
            --agent implementation-planner \
            --allow-all \
            -p "$PROMPT"

      - name: Commit planning results
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs: add implementation plan for issue #${{ steps.issue.outputs.number }}"
          git push origin "${{ steps.pr.outputs.branch }}"

      - name: Update planning comment to complete
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          gh api \
            -X PATCH \
            "/repos/${{ github.repository }}/issues/comments/${{ steps.planning-comment.outputs.id }}" \
            -f body="✅ **Planning完了**: implementation-planner エージェントによる計画作成が完了しました。"

      # --- Implementation Phase ---
      - name: Post implementation start comment
        id: implementation-comment
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          COMMENT_ID=$(gh api \
            -X POST \
            "/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments" \
            -f body="🔄 **実装開始**: implementation-executor エージェントが実装を進めています..." \
            --jq '.id')
          echo "id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Run implementation-executor agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          gh copilot -- \
            --agent implementation-executor \
            --allow-all \
            -p "plan/ フォルダ内の計画に基づいて実装を進めてください。対象Issue: #${ISSUE_NUMBER} - ${ISSUE_TITLE}"

      - name: Commit implementation results
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "feat: implement changes for issue #${{ steps.issue.outputs.number }}"
          git push origin "${{ steps.pr.outputs.branch }}"

      - name: Update implementation comment to complete
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          gh api \
            -X PATCH \
            "/repos/${{ github.repository }}/issues/comments/${{ steps.implementation-comment.outputs.id }}" \
            -f body="✅ **実装完了**: implementation-executor エージェントによる実装が完了しました。"

      # --- Finalize PR ---
      - name: Remove WIP from PR title and assign reviewer
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          CURRENT_TITLE=$(gh pr view "${{ steps.pr.outputs.number }}" --json title -q '.title')
          NEW_TITLE="${CURRENT_TITLE#\[WIP\] }"
          gh pr edit "${{ steps.pr.outputs.number }}" --title "$NEW_TITLE"
          gh pr edit "${{ steps.pr.outputs.number }}" --add-reviewer "@copilot"
