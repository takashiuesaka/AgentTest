name: Copilot Review Handler

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: '対象のPR番号'
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  handle-copilot-review:
    # pull_request_review の場合は Copilot のレビューのみ対象、workflow_dispatch は常に実行
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.review.user.login == 'copilot[bot]' ||
      github.event.review.user.login == 'github-copilot[bot]' ||
      github.event.review.user.login == 'copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number and branch
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          HEAD_REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName -q '.headRefName')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.branch }}
          fetch-depth: 0

      - name: Post review handling start comment
        id: start-comment
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          COMMENT_ID=$(gh api \
            -X POST \
            "/repos/${{ github.repository }}/issues/${{ steps.pr-info.outputs.number }}/comments" \
            -f body="🔄 **レビュー対応開始**: review-responder エージェントがCopilotのレビューコメントを処理中です..." \
            --jq '.id')
          echo "id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Run review-responder agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          PR_NUMBER: ${{ steps.pr-info.outputs.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)

          gh copilot -- \
            --agent review-responder \
            --allow-all \
            -p "PR #${PR_NUMBER} に対するCopilotのレビューコメントを処理してください。
          リポジトリ: ${GITHUB_REPOSITORY}
          オーナー: ${OWNER}
          リポジトリ名: ${REPO}
          PR番号: ${PR_NUMBER}

          手順:
          1. gh api でPRのレビューコメントを取得する
          2. 各コメントを評価する
          3. 正しい提案はコードに適用してコミット・プッシュする
          4. 不適切な提案はresolveしてコメントで理由を残す
          5. 最終サマリーをPRにコメントする"

      - name: Push any committed changes
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: apply copilot review suggestions for PR #${{ steps.pr-info.outputs.number }}"
          git push origin "${{ steps.pr-info.outputs.branch }}"

      - name: Update comment to complete
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          gh api \
            -X PATCH \
            "/repos/${{ github.repository }}/issues/comments/${{ steps.start-comment.outputs.id }}" \
            -f body="✅ **レビュー対応完了**: review-responder エージェントによるCopilotレビューの処理が完了しました。"
